name: Example.com Demo
match:
  domain: example.com
steps:
  # Navigate to the page
  - action: goto
    url: "${url}"
    wait_until: domcontentloaded

  # Replace the heading text
  - action: eval
    expression: |
      document.querySelector('h1').textContent = 'Hello from Loader!'

  # Replace the paragraph text
  - action: eval
    expression: |
      document.querySelector('p').textContent =
        'This page was modified by the example loader.'

  # Inject a styled banner at the top
  - action: eval
    expression: |
      (() => {
        const banner = document.createElement('div');
        banner.id = 'loader-banner';
        banner.textContent = 'Loader was here';
        banner.style.cssText =
          'background:#2563eb;color:#fff;padding:12px;text-align:center;' +
          'font-size:18px;font-weight:bold;position:fixed;top:0;left:0;' +
          'width:100%;z-index:9999';
        document.body.prepend(banner);
      })()

  # Trigger an alert (auto-accepted by the dialog handler)
  - action: eval
    expression: "alert('Page modified by loader!')"

  # Small pause so the page settles
  - action: sleep
    duration: 0.5
