name: pipeline

on: [push]

jobs:
  call-docker-image-workflow:
    uses: psyb0t/reusable-github-workflows/.github/workflows/docker-image-workflow.yml@master

    with:
      repository_name: psyb0t/stealthy-auto-browse
      target_platforms: "linux/amd64,linux/arm64"
      scan_severity: "high" # camoufox bundles Go 1.19 with unfixed criticals

    secrets:
      dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
