  # - action: scroll_to_bottom_humanized
  #   min_clicks: 2
  #   max_clicks: 6
  #   delay: 0.5

  # --- Tab management ---
  - action: list_tabs
    output_id: tabs

  # - action: new_tab
  #   url: https://example.com
  # - action: switch_tab
  #   index: 0
  # - action: close_tab
  #   index: 1

  # --- Cookies ---
  - action: get_cookies
    output_id: cookies

  # - action: set_cookie
