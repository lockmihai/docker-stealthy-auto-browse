# Example script showcasing all script mode features.
#
# Run:
#   cat scripts/example_script.yaml | docker run --rm -i \
#     -e TARGET_URL=https://example.com \
#     -v ./output:/output \
#     psyb0t/stealthy-auto-browse --script > results.json

name: Full Example Script

# "stop" (default) halts on first error, "continue" keeps going
on_error: stop

steps:
  # --- Environment variable substitution ---
  # ${env.VAR_NAME} is replaced with the env var value
  - action: goto
    url: ${env.TARGET_URL}
    wait_until: networkidle

  # --- Timing ---
  - action: sleep
    duration: 1

  # --- Wait conditions ---
  - action: wait_for_element
    selector: body
    state: visible
    timeout: 10

  - action: wait_for_network_idle
    timeout: 10

  # --- Page inspection with output_id ---
  # Any step with output_id collects its result into the "outputs" dict
  - action: get_text
    output_id: page_text

  - action: get_html
    output_id: page_html

  - action: eval
    expression: "document.title"
    output_id: title

  - action: eval
    expression: |
      (() => {
        const links = Array.from(document.querySelectorAll('a'));
        return links.map(a => ({ text: a.textContent.trim(), href: a.href }));
      })()
    output_id: all_links

  - action: get_interactive_elements
    output_id: elements

  # --- Screenshots ---
  # Browser viewport screenshot, base64 in outputs
  - action: save_screenshot
    output_id: browser_screenshot

  # Desktop screenshot (includes browser chrome)
  - action: save_screenshot
    type: desktop
    output_id: desktop_screenshot

  # Resized screenshot
  - action: save_screenshot
    output_id: thumbnail
    whLargest: 400

  # Also write to disk (path + output_id work together)
  - action: save_screenshot
    path: /output/page.png
    output_id: saved_screenshot

  # --- Playwright input (DOM-level) ---
  # These use CSS selectors or xpath= prefix
  # - action: click
  #   selector: "#some-button"
  # - action: fill
  #   selector: "#search-input"
  #   value: "search query"
  # - action: type
  #   selector: "#search-input"
  #   text: "typed text"
  #   delay: 0.05

  # --- System input (OS-level, undetectable) ---
  # - action: system_click
  #   x: 500
  #   y: 300
  # - action: mouse_move
  #   x: 500
  #   y: 300
  #   duration: 0.5
  # - action: mouse_click
  #   x: 500
  #   y: 300
  # - action: system_type
  #   text: "hello world"
  #   interval: 0.08
  # - action: send_key
  #   key: enter
  # - action: scroll
  #   amount: -3

  # --- Scrolling ---
  # - action: scroll_to_bottom
